    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f172a" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Music DNA",
      "description": "Discover your music personality with AI-powered Spotify analysis. Are you a Midnight Curator, Energy Architect, or Vibes Engineer?",
      "url": "https://beat-decoder-hub.lovable.app",
      "applicationCategory": "MusicApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "creator": {
        "@type": "Organization",
        "name": "Apollo Wrldx"
      }
    }
    </script>

    <!-- Prevent flash of wrong theme -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('music-dna-theme');
          if (!theme) {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

  <body>
    <div id="root"></div>

  </body>
